; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; default_envs = esp32-s3-box-3
default_envs = esp32dev
; ========================================================================
; ESP32-S3-BOX-3 Configuration (Default)
; ========================================================================
; Use this environment for ESP32-S3-BOX-3 hardware
; LED/Sensor Pins: GPIO 10 (IR LED), GPIO 11 (White LED), GPIO 12 (DHT22)
; Display: ST7789 320x240 (GPIO 6=MOSI, 7=SCLK, 5=CS, 4=DC, 48=RST, 47=BL)
; Note: Using esp32-s3-devkitc-1 as base board (compatible with ESP32-S3-BOX-3)
[env:esp32-s3-box-3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

; Build flags - Try USB CDC again with different settings
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_RUNNING_CORE=1
    -D ARDUINO_EVENT_RUNNING_CORE=1
    ; -D USE_DISPLAY=1  ; Display support requires ESP-IDF framework (not Arduino)

; Upload settings for ESP32-S3 (critical for successful uploads!)
upload_protocol = esptool
upload_speed = 115200
upload_flags =
    --chip
    esp32s3
    --before
    no_reset
    --after
    hard_reset
; Auto-detect port, or specify manually: upload_port = COM3
; Note: If upload fails, manually enter bootloader mode:
;   1. Hold BOOT button
;   2. Press and release RESET button
;   3. Release BOOT button
;   4. Run upload command

; Monitor settings for hardware UART
monitor_rts = 0
monitor_dtr = 0
monitor_filters = default

lib_deps =
    adafruit/DHT sensor library @ ^1.4.1

; ========================================================================
; Legacy ESP32 DevKit Configuration
; ========================================================================
; Use this environment for original ESP32 hardware
; Pins: GPIO 4 (IR LED), GPIO 15 (White LED), GPIO 14 (DHT22)
; NOTE: Change pin definitions in main.cpp to match!
[env:esp32dev]
platform = espressif32
board    = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    adafruit/DHT sensor library @ ^1.4.1
