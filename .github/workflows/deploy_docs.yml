name: Deploy MkDocs site

on:
  push:
    branches:
      - Nematostella-time-series-IR
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/sync_docs.py"
      - "CHANGELOG.md"
      - "Nematostella_circadian_cycle.md"
      - ".github/workflows/deploy_docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout recording plugin (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout analysis plugin (napari-hdf5-activity)
        uses: actions/checkout@v4
        with:
          repository: s1alknau/napari-hdf5-activity
          ref: main
          path: _analysis-src
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Sync Markdown into docs/
        env:
          ANALYSIS_REPO: ${{ github.workspace }}/_analysis-src
        run: python scripts/sync_docs.py

      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --clean
