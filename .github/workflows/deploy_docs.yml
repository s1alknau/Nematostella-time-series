name: Deploy MkDocs site

on:
  push:
    branches:
      - Nematostella-time-series-IR
    paths:
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/sync_docs.py"
      - "CHANGELOG.md"
      - "Nematostella_circadian_cycle.md"
      - ".github/workflows/deploy_docs.yml"
  workflow_dispatch:

# Official GitHub Pages deployment (Settings -> Pages -> Source: "GitHub Actions").
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout recording plugin (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout analysis plugin (napari-hdf5-activity)
        uses: actions/checkout@v4
        with:
          repository: s1alknau/napari-hdf5-activity
          ref: main
          path: _analysis-src
          fetch-depth: 1

      # napari-lsft must be PUBLIC for this checkout to succeed with the default
      # token. continue-on-error keeps the site deploying even if the repo is
      # still private; sync_docs.py then just skips the LSFT page.
      - name: Checkout LSFT plugin (napari-lsft)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: s1alknau/napari-lsft
          ref: main
          path: _lsft-src
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Sync Markdown into docs/
        env:
          ANALYSIS_REPO: ${{ github.workspace }}/_analysis-src
          LSFT_REPO: ${{ github.workspace }}/_lsft-src
        run: python scripts/sync_docs.py

      - name: Build site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
