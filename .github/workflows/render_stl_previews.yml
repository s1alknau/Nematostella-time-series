name: Render STL Previews

on:
  push:
    paths:
      - 'docs/3D_Druck/STL/**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSCAD and Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openscad xvfb

      - name: Render STL files to PNG
        run: |
          mkdir -p docs/3D_Druck/previews
          for stl in docs/3D_Druck/STL/*.stl; do
            name=$(basename "$stl" .stl)
            echo "Rendering $name ..."
            xvfb-run openscad \
              --render \
              --imgsize=800,600 \
              --camera=0,0,0,55,0,25,auto \
              --colorscheme=Tomorrow \
              -o "docs/3D_Druck/previews/${name}.png" \
              "$stl" || echo "  WARNING: failed to render $stl"
          done

      - name: Commit rendered previews
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/3D_Druck/previews/
          git diff --staged --quiet && echo "No new previews." || \
            git commit -m "CI: auto-render STL previews [skip ci]" && git push
