name: Render STL Previews

on:
  push:
    paths:
      - 'docs/3D_Druck/STL/**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up f3d
        uses: f3d-app/setup-f3d@v1

      - name: Render STL files to PNG
        run: |
          mkdir -p docs/3D_Druck/previews
          for stl in docs/3D_Druck/STL/*.stl; do
            name=$(basename "$stl" .stl)
            echo "Rendering $name ..."
            f3d \
              --output "docs/3D_Druck/previews/${name}.png" \
              --resolution 800,600 \
              --camera-position 1,1,1 \
              --camera-view-up 0,0,1 \
              "$stl" && echo "  OK" || echo "  WARNING: failed to render $stl"
          done

      - name: Commit rendered previews
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/3D_Druck/previews/
          git diff --staged --quiet && echo "No changes." || \
            (git commit -m "CI: auto-render STL previews [skip ci]" && git push)
