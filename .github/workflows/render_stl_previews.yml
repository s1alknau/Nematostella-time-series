name: Render STL Previews

on:
  push:
    paths:
      - 'docs/3D_Druck/STL/**'
      - 'scripts/render_stl_previews.py'
      - '.github/workflows/render_stl_previews.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Self-contained renderer (numpy + matplotlib). Replaces the upstream
      # f3d GitHub Action, which was removed and broke this workflow.
      - name: Install dependencies
        run: python -m pip install --upgrade numpy matplotlib

      - name: Render STL files to PNG
        run: python scripts/render_stl_previews.py

      - name: Commit rendered previews
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/3D_Druck/previews/
          git diff --staged --quiet && echo "No changes." || \
            (git commit -m "CI: auto-render STL previews [skip ci]" && git push)
